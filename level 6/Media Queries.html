<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
        .box{
            padding: 10px;
            height: 100px;
            width: 150px;
            background-color: darkviolet;
        }
        @media screen and (min-width: 300px){
            .box{
                padding: 15px;
                height: 150px;
                width: 500px;
                background-color: salmon;

            }
        }
    </style>
</head>
<body>
    <div class="box">Items</div>
</body>
</html>
